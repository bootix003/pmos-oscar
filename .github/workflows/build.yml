name: Build postmarketOS for Realme 9 Pro 5G (oscar)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip \
            gcc-aarch64-linux-gnu \
            bison flex libssl-dev libelf-dev \
            bc make openssl
          git clone --depth=1 https://git.sr.ht/~postmarketos/pmbootstrap /tmp/pmbootstrap
          echo "/tmp/pmbootstrap" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup pmbootstrap and pmaports
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          mkdir -p $WORK $PMAPORTS

          git clone --depth=1 https://gitlab.com/postmarketOS/pmaports.git $PMAPORTS
          cp -r device-realme-oscar $PMAPORTS/device/testing/
          cp -r linux-realme-oscar $PMAPORTS/device/testing/

          mkdir -p ~/.config/pmbootstrap
          printf '[pmbootstrap]\naports = %s\nccache_size = 5G\ndevice = realme-oscar\nextra_packages = nano,openssh\nhostname = oscar-pmos\njobs = 4\nkernel = downstream\nkeymap =\nlocale = en_US.UTF-8\nmirror_alpine = https://dl-cdn.alpinelinux.org/alpine/\nnonfree_firmware = true\nnonfree_userland = false\nssh_keys = false\ntimezone = UTC\nui = xfce4\nuser = user\nwork = %s\n' "$PMAPORTS" "$WORK" > ~/.config/pmbootstrap/config
          cat ~/.config/pmbootstrap/config
          pmbootstrap -y work_migrate

      - name: Build kernel
        run: |
          pmbootstrap -y build linux-realme-oscar 2>&1 | tee kernel-build.log

      - name: Build device package
        run: |
          pmbootstrap -y build device-realme-oscar 2>&1 | tee device-build.log

      - name: Install rootfs
        run: |
          pmbootstrap -y install --no-fde 2>&1 | tee install.log

      - name: Export images
        run: |
          pmbootstrap export
          mkdir output
          cp /tmp/postmarketOS-export/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: output/boot.img
          retention-days: 30

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-img
          path: output/rootfs*.img
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          retention-days: 7
