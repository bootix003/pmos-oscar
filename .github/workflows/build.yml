name: Build postmarketOS for Realme 9 Pro 5G (oscar)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PMB: python3 /tmp/pmbootstrap/pmbootstrap.py

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip \
            gcc-aarch64-linux-gnu \
            bison flex libssl-dev libelf-dev \
            bc make openssl

      - name: Install pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap
          ls /tmp/pmbootstrap/
          python3 /tmp/pmbootstrap/pmbootstrap.py --version

      - name: Setup pmaports
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          mkdir -p $WORK $PMAPORTS
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git $PMAPORTS
          cp -r device-realme-oscar $PMAPORTS/device/testing/
          cp -r linux-realme-oscar $PMAPORTS/device/testing/

      - name: Init pmbootstrap
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          printf 'realme-oscar\nxfce4\nuser\noscarpmos\nUTC\nen_US.UTF-8\n\n' | \
            python3 /tmp/pmbootstrap/pmbootstrap.py \
              --work $WORK \
              --aports $PMAPORTS \
              init || true
          python3 /tmp/pmbootstrap/pmbootstrap.py --work $WORK --aports $PMAPORTS config

      - name: Build kernel
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          python3 /tmp/pmbootstrap/pmbootstrap.py \
            --work $WORK --aports $PMAPORTS \
            -y build linux-realme-oscar 2>&1 | tee kernel-build.log

      - name: Build device package
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          python3 /tmp/pmbootstrap/pmbootstrap.py \
            --work $WORK --aports $PMAPORTS \
            -y build device-realme-oscar 2>&1 | tee device-build.log

      - name: Install rootfs
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          python3 /tmp/pmbootstrap/pmbootstrap.py \
            --work $WORK --aports $PMAPORTS \
            -y install --no-fde 2>&1 | tee install.log

      - name: Export images
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$WORK/cache_git/pmaports
          python3 /tmp/pmbootstrap/pmbootstrap.py \
            --work $WORK --aports $PMAPORTS \
            export
          mkdir output
          cp /tmp/postmarketOS-export/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: output/boot.img
          retention-days: 30

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-img
          path: output/rootfs*.img
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          retention-days: 7
