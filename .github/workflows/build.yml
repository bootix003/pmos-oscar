name: Build postmarketOS for Realme 9 Pro 5G (oscar)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip \
            gcc-aarch64-linux-gnu \
            bison flex libssl-dev libelf-dev \
            bc make openssl
          pip3 install --user pmbootstrap==2.1.0 --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup pmaports
        run: |
          git clone --depth=1 https://gitlab.com/postmarketOS/pmaports.git /tmp/pmaports
          cp -r device-realme-oscar /tmp/pmaports/device/testing/
          cp -r linux-realme-oscar /tmp/pmaports/device/testing/

      - name: Configure pmbootstrap
        run: |
          mkdir -p ~/.config/pmbootstrap
          cat > ~/.config/pmbootstrap/config << 'PMCONF'
[pmbootstrap]
aports = /tmp/pmaports
ccache_size = 5G
device = realme-oscar
extra_packages = nano,openssh
hostname = oscar-pmos
jobs = 4
kernel = downstream
keymap =
locale = en_US.UTF-8
mirror_alpine = https://dl-cdn.alpinelinux.org/alpine/
nonfree_firmware = true
nonfree_userland = false
ssh_keys = false
timezone = UTC
ui = xfce4
user = user
work = /home/runner/.local/var/pmbootstrap
PMCONF
          pmbootstrap -y work_migrate

      - name: Build kernel
        run: |
          pmbootstrap -y build linux-realme-oscar \
            2>&1 | tee kernel-build.log

      - name: Build device package
        run: |
          pmbootstrap -y build device-realme-oscar \
            2>&1 | tee device-build.log

      - name: Install (create rootfs)
        run: |
          pmbootstrap -y install --no-fde \
            2>&1 | tee install.log

      - name: Export images
        run: |
          pmbootstrap export
          mkdir output
          cp /tmp/postmarketOS-export/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: output/boot.img
          retention-days: 30

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-img
          path: output/rootfs*.img
          retention-days: 30

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          retention-days: 7
