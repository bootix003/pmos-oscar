name: Build postmarketOS for Realme 9 Pro 5G (oscar)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip \
            gcc-aarch64-linux-gnu \
            bison flex libssl-dev libelf-dev \
            bc make openssl

      - name: Install pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap
          python3 /tmp/pmbootstrap/pmbootstrap.py --version

      - name: Clone pmaports and copy device packages
        run: |
          git clone --depth=1 -b main \
            https://gitlab.postmarketos.org/postmarketOS/pmaports.git /tmp/pmaports
          cp -r device-realme-oscar /tmp/pmaports/device/testing/
          cp -r linux-realme-oscar /tmp/pmaports/device/testing/

      - name: Init pmbootstrap
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          mkdir -p $WORK
          python3 /tmp/pmbootstrap/pmbootstrap.py init << 'ANSWERS'
          $WORK
          /tmp/pmaports
          edge
          realme
          oscar
          xfce4
          user
          pulseaudio
          wpa_supplicant
          developer
          oscar-pmos
          UTC
          en_US.UTF-8
          n
          ANSWERS
          python3 /tmp/pmbootstrap/pmbootstrap.py config

      - name: Build kernel
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y build linux-realme-oscar \
            2>&1 | tee kernel-build.log

      - name: Build device package
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y build device-realme-oscar \
            2>&1 | tee device-build.log

      - name: Install rootfs
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y install --no-fde \
            2>&1 | tee install.log

      - name: Export images
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py export
          mkdir output
          cp /tmp/postmarketOS-export/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: output/boot.img
          retention-days: 30

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-img
          path: output/rootfs*.img
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          retention-days: 7
