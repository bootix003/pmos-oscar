name: Build postmarketOS for Realme 9 Pro 5G (oscar)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3 python3-pip \
            gcc-aarch64-linux-gnu \
            bison flex libssl-dev libelf-dev \
            bc make openssl

      - name: Install pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap
          python3 /tmp/pmbootstrap/pmbootstrap.py --version

      - name: Init pmbootstrap non-interactively
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          mkdir -p $WORK

          # Запускаем init с заготовленными ответами в правильном порядке:
          # work path, pmaports path, channel, vendor, codename, kernel, ui, user, hostname, timezone, locale, ssh_keys
          printf '%s\n\nedge\nrealme\noscar\ndownstream\nxfce4\nuser\noscar-pmos\nUTC\nen_US.UTF-8\nn\n' \
            "$WORK" | \
            python3 /tmp/pmbootstrap/pmbootstrap.py init || true

          # Принудительно выставляем нужные значения через config
          python3 /tmp/pmbootstrap/pmbootstrap.py config device realme-oscar
          python3 /tmp/pmbootstrap/pmbootstrap.py config ui xfce4
          python3 /tmp/pmbootstrap/pmbootstrap.py config kernel downstream
          python3 /tmp/pmbootstrap/pmbootstrap.py config user user
          python3 /tmp/pmbootstrap/pmbootstrap.py config hostname oscar-pmos
          python3 /tmp/pmbootstrap/pmbootstrap.py config timezone UTC
          python3 /tmp/pmbootstrap/pmbootstrap.py config locale en_US.UTF-8
          python3 /tmp/pmbootstrap/pmbootstrap.py config ssh_keys false
          python3 /tmp/pmbootstrap/pmbootstrap.py config channel edge

          # Показываем итоговый конфиг
          python3 /tmp/pmbootstrap/pmbootstrap.py config

      - name: Copy device packages to pmaports
        run: |
          WORK=/home/runner/.local/var/pmbootstrap
          PMAPORTS=$(python3 /tmp/pmbootstrap/pmbootstrap.py config aports)
          echo "pmaports at: $PMAPORTS"
          cp -r device-realme-oscar $PMAPORTS/device/testing/
          cp -r linux-realme-oscar $PMAPORTS/device/testing/

      - name: Build kernel
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y build linux-realme-oscar \
            2>&1 | tee kernel-build.log

      - name: Build device package
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y build device-realme-oscar \
            2>&1 | tee device-build.log

      - name: Install rootfs
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py -y install --no-fde \
            2>&1 | tee install.log

      - name: Export images
        run: |
          python3 /tmp/pmbootstrap/pmbootstrap.py export
          mkdir output
          cp /tmp/postmarketOS-export/* output/ 2>/dev/null || true
          ls -lh output/

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: output/boot.img
          retention-days: 30

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-img
          path: output/rootfs*.img
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: "*.log"
          retention-days: 7
